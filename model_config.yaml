  - name: "Ridge alpha=1.0"
    type: "Ridge"
    params:
      alpha: 1.0

  - name: "Ridge alpha=10.0"
    type: "Ridge"
    params:
      alpha: 10.0

  - name: "Lasso alpha=0.01"
    type: "Lasso"
    params:
      alpha: 0.01

  - name: "Lasso alpha=0.1"
    type: "Lasso"
    params:
      alpha: 0.1

  - name: "Lasso alpha=1.0"
    type: "Lasso"
    params:
      alpha: 1.0